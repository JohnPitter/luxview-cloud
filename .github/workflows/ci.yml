name: CI

on:
  pull_request:
    branches: [main]

jobs:
  dashboard-build:
    name: Dashboard — Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: luxview-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: luxview-dashboard/package-lock.json

      - run: npm ci
      - name: Typecheck
        run: npx tsc -b
      - name: Build
        run: npm run build

  dashboard-security:
    name: Dashboard — Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: luxview-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: luxview-dashboard/package-lock.json

      - run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=critical || true

  engine-build:
    name: Engine — Vet & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: luxview-engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: luxview-engine/go.mod
          cache-dependency-path: luxview-engine/go.sum

      - name: Vet
        run: go vet ./...
      - name: Build
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/engine

  engine-security:
    name: Engine — Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: luxview-engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: luxview-engine/go.mod
          cache-dependency-path: luxview-engine/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan for vulnerabilities
        run: govulncheck ./... || true
