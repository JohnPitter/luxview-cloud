name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  dashboard:
    name: Dashboard — Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: luxview-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: luxview-dashboard/package-lock.json

      - run: npm ci
      - run: npx tsc -b
      - run: npm run build

  engine:
    name: Engine — Build & Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: luxview-engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: luxview-engine/go.mod
          cache-dependency-path: luxview-engine/go.sum

      - run: go vet ./...
      - run: CGO_ENABLED=0 go build -o /dev/null ./cmd/engine
