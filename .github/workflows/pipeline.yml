name: Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Stage 1: Frontend ─────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: luxview-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: luxview-dashboard/package-lock.json

      - run: npm ci
      - name: Typecheck
        run: npx tsc -b
      - name: Build
        run: npm run build

  frontend-security:
    name: Frontend — Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: luxview-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: luxview-dashboard/package-lock.json

      - run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=critical || true

  # ── Stage 2: Backend (after frontend passes) ──────────────────────────────
  backend-build:
    name: Backend — Vet & Build
    needs: [frontend-build, frontend-security]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: luxview-engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: luxview-engine/go.mod
          cache-dependency-path: luxview-engine/go.sum

      - name: Vet
        run: go vet ./...
      - name: Build
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/engine

  backend-security:
    name: Backend — Security Scan
    needs: [frontend-build, frontend-security]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: luxview-engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: luxview-engine/go.mod
          cache-dependency-path: luxview-engine/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan for vulnerabilities
        run: govulncheck ./... || true

  # ── Stage 3: Deploy (only on push to main, after all stages) ──────────────
  deploy:
    name: Deploy to VPS
    if: github.event_name == 'push'
    needs: [backend-build, backend-security]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 300s
          script: |
            set -e
            cd /opt/luxview-cloud
            git pull origin main
            docker compose up -d --build dashboard engine
            docker image prune -f
