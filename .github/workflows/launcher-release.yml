name: Launcher Release

# Publica o .exe oficial do launcher no GitHub Releases.
# Dispara ao empurrar uma tag "launcher-v*" (ex.: launcher-v1.32).
# A versão da tag é injetada no binário via -ldflags, e o launcher se
# auto-atualiza a partir desta release (engine /api/public/launcher).
on:
  push:
    tags:
      - 'launcher-v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & publish (windows/amd64)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: luxview-launcher

    steps:
      - uses: actions/checkout@v5

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^launcher-', ''
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Launcher version: $ver"

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: luxview-launcher/go.sum

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: luxview-launcher/frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build launcher
        run: wails build -platform windows/amd64 -ldflags "-X main.appVersion=${{ steps.ver.outputs.version }}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LuxView Launcher ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: luxview-launcher/build/bin/luxview-launcher.exe
