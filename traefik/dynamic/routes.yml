# =============================================================================
# Traefik — Platform Routes (Engine + Dashboard)
# =============================================================================

http:
  routers:
    # API routes → Engine
    engine-api:
      rule: "Host(`luxview.cloud`) && PathPrefix(`/api`)"
      entryPoints:
        - websecure
      service: engine-svc
      tls:
        certResolver: letsencrypt
      middlewares:
        - security-headers
        - rate-limit
      priority: 10

    # WebSocket routes → Engine
    engine-ws:
      rule: "Host(`luxview.cloud`) && PathPrefix(`/ws`)"
      entryPoints:
        - websecure
      service: engine-svc
      tls:
        certResolver: letsencrypt
      priority: 10

    # Dashboard (catch-all for luxview.cloud)
    dashboard:
      rule: "Host(`luxview.cloud`)"
      entryPoints:
        - websecure
      service: dashboard-svc
      tls:
        certResolver: letsencrypt
      middlewares:
        - security-headers
        - gzip-compress
      priority: 1

    # Webmail → Roundcube
    webmail:
      rule: "Host(`mail.luxview.cloud`)"
      entryPoints:
        - websecure
      service: roundcube-svc
      tls:
        certResolver: letsencrypt
      middlewares:
        - security-headers
      priority: 10

    # Catch-all for deleted/unknown *.luxview.cloud subdomains
    # Priority must be lower than dynamic app routes (which default to rule length)
    app-not-found:
      rule: "HostRegexp(`^.+\\.luxview\\.cloud$`)"
      entryPoints:
        - websecure
      service: dashboard-svc
      tls:
        certResolver: letsencrypt
      middlewares:
        - security-headers
      priority: 1

  serversTransports:
    engine-transport:
      forwardingTimeouts:
        dialTimeout: 30s
        responseHeaderTimeout: 300s
        idleConnTimeout: 300s

  services:
    engine-svc:
      loadBalancer:
        serversTransport: engine-transport@file
        servers:
          - url: "http://luxview-engine:8080"
        responseForwarding:
          flushInterval: 100ms

    dashboard-svc:
      loadBalancer:
        servers:
          - url: "http://luxview-dashboard:80"

    roundcube-svc:
      loadBalancer:
        servers:
          - url: "http://luxview-roundcube:80"
