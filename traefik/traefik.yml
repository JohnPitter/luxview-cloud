# =============================================================================
# Traefik v3 — Static Configuration (Production)
# =============================================================================

# -- Global -------------------------------------------------------------------
global:
  checkNewVersion: false
  sendAnonymousUsage: false

# -- Entrypoints --------------------------------------------------------------
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    transport:
      respondingTimeouts:
        readTimeout: 300s
        writeTimeout: 300s
        idleTimeout: 300s
    http:
      tls:
        certResolver: letsencrypt

# -- Certificate Resolvers (Let's Encrypt) ------------------------------------
certificatesResolvers:
  letsencrypt:
    acme:
      email: "admin@luxview.cloud"
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

# -- Providers ----------------------------------------------------------------
providers:
  # File provider for platform routes + middleware
  file:
    directory: /etc/traefik/dynamic
    watch: true

  # HTTP provider — polls Engine every 5s for user app routes
  http:
    endpoint: "http://luxview-engine:8080/api/internal/traefik-config"
    pollInterval: 5s
    pollTimeout: 3s

# -- API / Dashboard (disabled in production) ---------------------------------
api:
  dashboard: false

# -- Logging ------------------------------------------------------------------
log:
  level: WARN
  format: json

accessLog:
  filePath: /var/log/traefik/access.json
  format: json
  filters:
    statusCodes:
      - "200-599"
  fields:
    headers:
      defaultMode: drop
      names:
        User-Agent: keep
        Referer: keep
