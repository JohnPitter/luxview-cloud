[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
user=root

[program:postgresql]
command=/usr/lib/postgresql/16/bin/postgres -D /openmu-data/pgdata
user=postgres
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:openmu]
command=dotnet MUnique.OpenMU.Startup.dll -autostart
directory=/opt/openmu
autostart=true
autorestart=true
priority=20
startsecs=10
startretries=5
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
environment=DB_HOST="localhost",ASPNETCORE_URLS="http://+:8080"
