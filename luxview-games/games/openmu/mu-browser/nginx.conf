# nginx config for the muonlinejs browser client (play.luxview.cloud).
# Aggressive caching of the large (~533MB) game assets so they only download
# once, plus SPA fallback for client-side routing.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets + converted game assets are immutable → cache hard.
    location /game-assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location ~* \.(glb|jpg|jpeg|png|tga|ogg|mp3|wav|ozg|ozj|ozt|bmd)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
