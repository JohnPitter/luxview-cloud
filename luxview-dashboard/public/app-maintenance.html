<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Em Manuten&ccedil;&atilde;o &mdash; LuxView Cloud</title>
  <meta http-equiv="refresh" content="30">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #09090b;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(251, 191, 36, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(251, 191, 36, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: grid-drift 20s linear infinite;
    }

    @keyframes grid-drift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    .container {
      position: relative;
      text-align: center;
      max-width: 480px;
      animation: fade-up 0.8s ease-out;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon-wrapper {
      position: relative;
      display: inline-flex;
      margin-bottom: 32px;
    }

    .icon-box {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      background: rgba(251, 191, 36, 0.08);
      border: 1px solid rgba(251, 191, 36, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: spin-slow 4s linear infinite;
    }

    @keyframes spin-slow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .icon-box svg {
      width: 48px;
      height: 48px;
      color: #FBBF24;
      opacity: 0.8;
    }

    .pulse-ring {
      position: absolute;
      inset: -8px;
      border-radius: 28px;
      border: 1px solid rgba(251, 191, 36, 0.1);
      animation: pulse-expand 2.5s ease-out infinite;
    }

    @keyframes pulse-expand {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.3); opacity: 0; }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 12px;
      color: #fafafa;
    }

    .subdomain {
      display: inline-block;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 14px;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.2);
      color: #FBBF24;
      padding: 4px 12px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .description {
      font-size: 15px;
      line-height: 1.6;
      color: #a1a1aa;
      margin-bottom: 8px;
    }

    .support {
      font-size: 13px;
      color: #71717a;
      margin-bottom: 36px;
    }

    .progress-bar {
      width: 200px;
      height: 3px;
      background: rgba(251, 191, 36, 0.15);
      border-radius: 4px;
      margin: 0 auto;
      overflow: hidden;
    }

    .progress-bar::after {
      content: '';
      display: block;
      width: 40%;
      height: 100%;
      background: #FBBF24;
      border-radius: 4px;
      animation: progress-slide 1.5s ease-in-out infinite;
    }

    @keyframes progress-slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .logo {
      position: fixed;
      bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #52525b;
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.2s;
    }

    .logo:hover { color: #a1a1aa; }

    .logo svg {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <div class="icon-box">
        <!-- Wrench/gear icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z" opacity="0.3"/>
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
      </div>
      <div class="pulse-ring"></div>
    </div>

    <h1>Em manuten&ccedil;&atilde;o</h1>

    <div class="subdomain" id="subdomain"></div>

    <p class="description">
      Esta aplica&ccedil;&atilde;o est&aacute; em manuten&ccedil;&atilde;o e voltar&aacute; em breve.
    </p>
    <p class="support">
      A p&aacute;gina ser&aacute; atualizada automaticamente quando o servi&ccedil;o estiver dispon&iacute;vel.
    </p>

    <div class="progress-bar"></div>
  </div>

  <a href="https://luxview.cloud" class="logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
      <path d="M8 24h18a6 6 0 0 0 1.5-11.8A8 8 0 0 0 12 10a6 6 0 0 0-4 14z" fill="currentColor"/>
      <polygon points="16,10 12.5,18 14.5,18 14.5,22 17.5,22 17.5,18 19.5,18" fill="#09090b"/>
    </svg>
    LuxView Cloud
  </a>

  <script>
    var host = window.location.hostname;
    document.getElementById('subdomain').textContent = host;
  </script>
</body>
</html>
